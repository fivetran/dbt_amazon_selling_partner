# Test scenarios configuration for amazon_selling_partner dbt package
# This file defines the different test scenarios to run during CI/CD

# Required: The dbt variable name that controls which schema to use for testing
schema_variable_name: "amazon_selling_partner_schema"

# Test scenarios - FIRST MUST BE DEFAULT WITH NO VARS
dbt_adapter_versions:
  snowflake: ">=1.3.0,<2.0.0"
  bigquery: ">=1.3.0,<2.0.0"
  postgres: ">=1.3.0,<2.0.0"
  redshift: ">=1.3.0,<2.0.0"
  databricks: ">=1.6.0,<2.0.0"

test_scenarios:

  # REQUIRED: Default scenario with no custom variables
  - name: "Default"
    vars: {}
    include_incremental: false

  # Orders and FBA modules disabled
  - name: "orders fba disabled"
    vars:
      amazon_selling_partner__using_orders_module: false
      amazon_selling_partner__using_fba_module: false
    include_incremental: false

  # Catalog module disabled
  - name: "catalog disabled"
    vars:
      amazon_selling_partner__using_catalog_module: false
    include_incremental: false